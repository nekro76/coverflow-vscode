<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="{styleUri}">
</head>
<body>
    <div class="header">
        <span class="title">CoverFlow</span>
        <div class="header-actions">
            <button class="icon-btn" onclick="toggleShuffle()" title="Shuffle">🔀</button>
            <button class="icon-btn" onclick="toggleRepeat()" title="Repeat">🔁</button>
        </div>
    </div>

    <div class="carousel-container">
        <div id="carousel" class="carousel">
            <div id="card-left" class="card left">
                <img src="" class="cover-art">
                <div class="placeholder">🎵</div>
            </div>
            <div id="card-center" class="card center">
                <img src="" class="cover-art">
                <div class="placeholder">🎵</div>
            </div>
            <div id="card-right" class="card right">
                <img src="" class="cover-art">
                <div class="placeholder">🎵</div>
            </div>
        </div>
    </div>

    <div class="track-info">
        <div class="track-title" id="title">Loading...</div>
        <div class="track-artist" id="artist"></div>
    </div>

    <div class="controls">
        <button class="control-btn" onclick="previous()">⏮</button>
        <button class="play-btn" id="playBtn" onclick="togglePlay()">⏸</button>
        <button class="control-btn" onclick="next()">⏭</button>
    </div>

    <div class="volume-container">
        <span>🔈</span>
        <input type="range" id="volumeSlider" min="0" max="100" value="50" oninput="setVolume(this.value)">
        <span>🔊</span>
    </div>

    <script>
        const vscode = acquireVsCodeApi();
        let currentTrack = null;
        
        window.addEventListener('message', event => {
            const message = event.data;
            switch (message.type) {
                case 'trackUpdate':
                    handleTrackUpdate(message.track, message.isPlaying);
                    break;
            }
        });

        let isTransitioning = false;
        let startX = 0;
        let isDragging = false;

        window.addEventListener('keydown', event => {
            if (isTransitioning) return;
            switch (event.key) {
                case 'ArrowLeft':
                    previous();
                    break;
                case 'ArrowRight':
                    next();
                    break;
                case ' ':
                    togglePlay();
                    break;
            }
        });

        // Mouse/Touch Gestures
        const carouselContainer = document.querySelector('.carousel-container');
        
        carouselContainer.addEventListener('mousedown', e => {
            startX = e.pageX;
            isDragging = true;
        });

        window.addEventListener('mousemove', e => {
            if (!isDragging || isTransitioning) return;
            const currentX = e.pageX;
            const diff = currentX - startX;
            
            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    previous();
                } else {
                    next();
                }
                isDragging = false;
            }
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Touch Support
        carouselContainer.addEventListener('touchstart', e => {
            startX = e.touches[0].pageX;
            isDragging = true;
        });

        carouselContainer.addEventListener('touchmove', e => {
            if (!isDragging || isTransitioning) return;
            const currentX = e.touches[0].pageX;
            const diff = currentX - startX;
            
            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    previous();
                } else {
                    next();
                }
                isDragging = false;
            }
        });

        carouselContainer.addEventListener('touchend', () => {
            isDragging = false;
        });

        function handleTrackUpdate(track, isPlaying) {
            const titleEl = document.getElementById('title');
            const artistEl = document.getElementById('artist');
            const playBtn = document.getElementById('playBtn');
            const carousel = document.getElementById('carousel');
            
            // If track changed, we might want to animate a shift
            if (currentTrack && track && currentTrack.name !== track.name) {
                // If not already transitioning (via user interaction), we show a simple update
                if (!isTransitioning) {
                   updateCard('center', track);
                }
            } else {
                updateCard('center', track);
            }
            
            if (track) {
                titleEl.textContent = track.name;
                artistEl.textContent = track.artist + ' - ' + track.album;
                currentTrack = track;
            } else {
                titleEl.textContent = 'Not Playing';
                artistEl.textContent = '';
                currentTrack = null;
            }

            playBtn.textContent = isPlaying ? '⏸' : '▶️';
            isTransitioning = false;
            carousel.classList.remove('slide-left', 'slide-right');
        }

        function updateCard(position, track) {
            const cardArt = document.querySelector(`#card-${position} .cover-art`);
            const cardPlaceholder = document.querySelector(`#card-${position} .placeholder`);

            if (track && track.artworkBase64) {
                cardArt.src = 'data:image/png;base64,' + track.artworkBase64;
                cardArt.style.display = 'block';
                cardPlaceholder.style.display = 'none';
            } else {
                cardArt.style.display = 'none';
                cardPlaceholder.style.display = 'flex';
            }
        }

        function previous() { 
            if (isTransitioning) return;
            isTransitioning = true;
            document.getElementById('carousel').classList.add('slide-right');
            vscode.postMessage({ command: 'previous' }); 
        }
        
        function next() { 
            if (isTransitioning) return;
            isTransitioning = true;
            document.getElementById('carousel').classList.add('slide-left');
            vscode.postMessage({ command: 'next' }); 
        }

        function togglePlay() { vscode.postMessage({ command: 'togglePlayPause' }); }
        function toggleShuffle() { vscode.postMessage({ command: 'toggleShuffle' }); }
        function toggleRepeat() { vscode.postMessage({ command: 'toggleRepeat' }); }
        function setVolume(value) { vscode.postMessage({ command: 'volume', value: parseInt(value) }); }

        // Initial request
        vscode.postMessage({ command: 'getTrack' });
    </script>
</body>
</html>
