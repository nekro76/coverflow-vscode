<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {cspSource} 'unsafe-inline'; img-src {cspSource} data:; script-src 'nonce-{nonce}';">
    <link rel="stylesheet" type="text/css" href="{styleUri}">
</head>
<body>
    <div class="header">
        <span class="title">Now Playing</span>
    </div>

    <div class="artwork-container">
        <img id="artwork" class="artwork" src="" alt="Album Art">
        <div id="artworkPlaceholder" class="artwork-placeholder">🎵</div>
    </div>

    <div class="track-info">
        <div class="track-title" id="title">No track playing</div>
        <div class="track-artist" id="artist"></div>
    </div>

    <div class="controls">
        <button id="prevBtn" class="control-btn">⏮</button>
        <button id="playBtn" class="play-btn">▶</button>
        <button id="nextBtn" class="control-btn">⏭</button>
    </div>

    <script nonce="{nonce}">
        const vscode = acquireVsCodeApi();

        window.addEventListener('message', event => {
            const message = event.data;
            if (message.type === 'trackUpdate') {
                handleTrackUpdate(message);
            }
        });

        function handleTrackUpdate(message) {
            const track = message.track;
            const isPlaying = message.isPlaying;
            
            const titleEl = document.getElementById('title');
            const artistEl = document.getElementById('artist');
            const artwork = document.getElementById('artwork');
            const placeholder = document.getElementById('artworkPlaceholder');
            const playBtn = document.getElementById('playBtn');

            if (track) {
                titleEl.textContent = track.name;
                artistEl.textContent = track.artist + (track.album ? ' - ' + track.album : '');
                
                if (track.artworkBase64 && track.artworkBase64.length > 0) {
                    const mimeType = track.artworkMimeType || 'image/jpeg';
                    const dataUrl = `data:${mimeType};base64,${track.artworkBase64}`;
                    artwork.src = dataUrl;
                    artwork.onerror = () => {
                        artwork.style.display = 'none';
                        placeholder.style.display = 'flex';
                    };
                    artwork.onload = () => {
                        artwork.style.display = 'block';
                        placeholder.style.display = 'none';
                    };
                } else {
                    artwork.style.display = 'none';
                    placeholder.style.display = 'flex';
                }
            } else {
                titleEl.textContent = 'No track playing';
                artistEl.textContent = '';
                artwork.style.display = 'none';
                placeholder.style.display = 'flex';
            }

            playBtn.textContent = isPlaying ? '⏸' : '▶️';
        }

        document.getElementById('prevBtn').addEventListener('click', () => {
            vscode.postMessage({ command: 'previous' });
            vscode.postMessage({ command: 'getTrack' });
        });
        
        document.getElementById('nextBtn').addEventListener('click', () => {
            vscode.postMessage({ command: 'next' });
            vscode.postMessage({ command: 'getTrack' });
        });

        document.getElementById('playBtn').addEventListener('click', () => {
            vscode.postMessage({ command: 'togglePlayPause' });
            vscode.postMessage({ command: 'getTrack' });
        });

        vscode.postMessage({ command: 'getTrack' });
    </script>
</body>
</html>
